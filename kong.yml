_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:8081"
      methods:
        - GET
        - HEAD
        - PUT
        - PATCH
        - POST
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

services:
  # Zonas corre DENTRO de Docker, usamos el nombre "zonas"
  - name: zonas-espacios-service
    url: http://zonas:8080
    routes:
      - name: zonas-espacios-route
        paths:
          - /api/zonas
        strip_path: false

  - name: zonas-docs-service
    url: http://zonas:8080/v3/api-docs
    routes:
      - name: zonas-docs-route
        paths:
          - /docs/zonas
        strip_path: true

  # Vehículos corre DENTRO de Docker, usamos el nombre del contenedor "vehiculos"
  - name: vehiculos-service
    url: http://vehiculos:3000
    routes:
      - name: vehiculos-route
        paths:
          - /api/vehiculos
        strip_path: false
      - name: vehiculos-gateway-route
        paths:
          - /api/gateway
        strip_path: false

  - name: vehiculos-docs-service
    url: http://vehiculos:3000/api/vehiculos/docs-json
    routes:
      - name: vehiculos-docs-route
        paths:
          - /docs/vehiculos
        strip_path: true

  # Usuarios corre DENTRO de Docker, usamos el nombre "gestion-usuarios"
  - name: gestion-usuarios-service
    url: http://gestion-usuarios:3001
    routes:
      - name: gestion-usuarios-route
        paths:
          - /api/usuarios
        strip_path: true

  - name: gestion-usuarios-docs-service
    url: http://gestion-usuarios:3001/docs-json
    routes:
      - name: gestion-usuarios-docs-route
        paths:
          - /docs/usuarios
        strip_path: true

  # Asignación y Trazabilidad corre DENTRO de Docker
  - name: asignacion-trazabilidad-service
    url: http://asignacion-trazabilidad:3002
    routes:
      - name: asignacion-trazabilidad-route
        paths:
          - /api/asignacion-trazabilidad
        strip_path: false

# Consumer autorizado a llamar /api/vehiculos y /api/gateway.
consumers:
  - username: sistema-tickets
