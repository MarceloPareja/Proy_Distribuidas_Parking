_format_version: "3.0"

x-auth-plugin: &auth-plugin
  name: pre-function
  config:
    access:
      - |
        local http = require "resty.http"
        local cjson = require "cjson.safe"
        local httpc = http.new()

        local method = kong.request.get_method()
        local path = kong.request.get_path()  -- path del CLIENTE, antes de strip_path
        local auth_header = kong.request.get_header("Authorization")
        if not auth_header then
          return kong.response.exit(401, { message = "Falta el header Authorization" })
        end
        

        local res, err = httpc:request_uri("http://gestion-usuarios:3001/auth/validate", {
          method = "GET",
          headers = {
            ["Authorization"] = auth_header,
            ["X-Original-Method"] = method,
            ["X-Original-Path"] = path,
          },
          timeout = 3000,
        })

        if not res then
          kong.log.err("auth-validate error: ", err)
          return kong.response.exit(502, { message = "No se pudo validar la identidad" })
        end

        if res.status ~= 200 then
          return kong.response.exit(res.status, res.body)
        end

        local user = cjson.decode(res.body)
        if user then
          kong.service.request.set_header("X-User-Id", tostring(user.userId or ""))
          kong.service.request.set_header("X-User-Username", tostring(user.username or ""))
          kong.service.request.set_header("X-User-Roles", table.concat(user.roles or {}, ","))
        end

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:8081"
      methods:
        - GET
        - HEAD
        - PUT
        - PATCH
        - POST
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

services:
  # Zonas corre DENTRO de Docker, usamos el nombre "zonas"
  - name: zonas-espacios-service
    url: http://zonas:8080
    routes:
      - name: zonas-espacios-route
        paths:
          - /api/zonas
        strip_path: false

  - name: zonas-docs-service
    url: http://zonas:8080/v3/api-docs
    routes:
      - name: zonas-docs-route
        paths:
          - /docs/zonas
        strip_path: true

  # Vehículos corre DENTRO de Docker, usamos el nombre del contenedor "vehiculos"
  - name: vehiculos-service
    url: http://vehiculos:3000
    routes:
      - name: vehiculos-route
        paths:
          - /api/vehiculos
        strip_path: false
      - name: vehiculos-gateway-route
        paths:
          - /api/gateway
        strip_path: false

  - name: vehiculos-docs-service
    url: http://vehiculos:3000/api/vehiculos/docs-json
    routes:
      - name: vehiculos-docs-route
        paths:
          - /docs/vehiculos
        strip_path: true

  # Usuarios corre DENTRO de Docker, usamos el nombre "gestion-usuarios"
  - name: gestion-usuarios-service
    url: http://gestion-usuarios:3001
    routes:
      - name: gestion-usuarios-route
        paths:
          - /api/usuarios
        strip_path: true

  - name: gestion-usuarios-docs-service
    url: http://gestion-usuarios:3001/docs-json
    routes:
      - name: gestion-usuarios-docs-route
        paths:
          - /docs/usuarios
        strip_path: true

