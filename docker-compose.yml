version: '3.8'

services:

  # ─────────────── BASES DE DATOS ───────────────

  db-vehiculos:
    image: postgres:16-alpine
    container_name: db-vehiculos
    environment:
      POSTGRES_USER: vehiculos
      POSTGRES_PASSWORD: vehiculos
      POSTGRES_DB: vehiculos
    volumes:
      - db-vehiculos-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehiculos"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-usuarios:
    image: postgres:16-alpine
    container_name: db-usuarios
    environment:
      POSTGRES_USER: usuarios
      POSTGRES_PASSWORD: usuarios
      POSTGRES_DB: usuarios
    volumes:
      - db-usuarios-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuarios"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-zonas:
    image: postgres:16-alpine
    container_name: db-zonas
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: test
    ports:
      - "5433:5432"
    volumes:
      - db-zonas-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────── MICROSERVICIOS ───────────────

  zonas:
    build:
      context: ./ModuloZonas
    container_name: zonas-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-zonas:5432/test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
    depends_on:
      db-zonas:
        condition: service_healthy
    ports:
      - "8080:8080"

  vehiculos:
    build:
      context: ./VehiclesNPM/vehiculos
    container_name: vehiculos-service
    environment:
      PORT: 3000
      DB_HOST: db-vehiculos
      DB_PORT: 5432
      DB_USUARIO: vehiculos
      DB_CONTRASENA: vehiculos
      DB_NOMBRE: vehiculos
      ZONAS_SERVICE_URL: http://host.docker.internal:8080
      GESTION_USUARIOS_URL: http://gestion-usuarios:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-vehiculos:
        condition: service_healthy
    ports:
      - "3000:3000"

  gestion-usuarios:
    build:
      context: ./gestion-usuarios
    container_name: gestion-usuarios-service
    environment:
      PORT: 3001
      DB_HOST: db-usuarios
      DB_PORT: 5432
      DB_USUARIO: usuarios
      DB_CONTRASENA: usuarios
      DB_NOMBRE: usuarios
    depends_on:
      db-usuarios:
        condition: service_healthy
    ports:
      - "3001:3001"

  # ─────────────── INFRAESTRUCTURA ───────────────

  kong:
    image: kong:latest
    container_name: kong-gateway
    depends_on:
      - vehiculos
      - gestion-usuarios
      - zonas
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"   # Proxy — único punto de entrada público
      - "8001:8001"   # Admin API
    volumes:
      - ./kong.yml:/opt/kong/kong.yml:ro

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    ports:
      - "8081:8080"
    environment:
      # ACTUALIZADO: Ambos apuntan a Kong (puerto 8000)
      URLS: >-
        [
          { "url": "http://localhost:8000/docs/vehiculos", "name": "Vehiculos" },
          { "url": "http://localhost:8000/docs/usuarios", "name": "Usuarios" },
          { "url": "http://localhost:8000/docs/zonas", "name": "Zonas" }
        ]

volumes:
  db-vehiculos-data:
  db-usuarios-data:
  db-zonas-data: